<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Иди Қурбон Муборак</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9922a;
  --gold-light: #f1c40f;
  --gold-pale: #f5e6b8;
  --gold-glow: rgba(201,146,42,0.45);
  --deep: #020712;
  --navy: #050f22;
  --midnight: #071428;
  --card-bg: rgba(5,14,30,0.55);
  --text-bright: #fdf6e3;
  --text-muted: #a0aec0;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--deep);
  font-family:'Cinzel','Georgia',serif;
  color:#fff;
  -webkit-tap-highlight-color:transparent;
}

/* ─── CANVAS ─── */
#vfx {
  position:fixed; inset:0;
  width:100%; height:100%;
  display:block; z-index:0;
}

/* ─── AMBIENT OVERLAY ─── */
.ambient {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(circle at 50% 25%, rgba(18,53,91,0.25) 0%, transparent 70%);
}

/* ─── PORTAL ─── */
#portal {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at center, #07111e 0%, #020509 100%);
  transition:opacity 2.5s ease, visibility 2.5s ease;
}
#portal.gone { opacity:0; visibility:hidden; pointer-events:none; }

.portal-box {
  text-align:center;
  padding:clamp(28px,6vw,52px) clamp(22px,5vw,44px);
  max-width:min(440px,90vw);
  width:100%;
  border:1px solid rgba(201,146,42,0.25);
  border-radius:6px;
  background:rgba(4,10,22,0.8);
  backdrop-filter:blur(20px);
  box-shadow:0 30px 80px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.08);
  animation:portalIn 1.8s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes portalIn { from{opacity:0;transform:scale(0.93) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

.portal-icon {
  width:56px; height:56px; margin:0 auto 20px;
  fill:var(--gold); filter:drop-shadow(0 0 10px var(--gold-glow));
  animation:spinSlow 12s linear infinite;
}
@keyframes spinSlow { to{transform:rotate(360deg)} }

.portal-title {
  font-size:clamp(0.85rem,2.5vw,1.1rem);
  letter-spacing:4px; text-transform:uppercase;
  color:#c8d6e5; font-weight:400; margin-bottom:24px;
}

.portal-input {
  width:100%; padding:13px 18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,146,42,0.3);
  border-radius:3px; color:#fff;
  font-size:clamp(0.95rem,2.5vw,1.1rem);
  text-align:center; outline:none;
  letter-spacing:1.5px;
  font-family:inherit;
  transition:border-color .4s, box-shadow .4s, background .4s;
}
.portal-input::placeholder { color:rgba(255,255,255,0.3); }
.portal-input:focus {
  border-color:var(--gold-light);
  background:rgba(255,255,255,0.07);
  box-shadow:0 0 22px rgba(201,146,42,0.18);
}

.portal-btn {
  margin-top:22px;
  padding:13px 38px;
  background:linear-gradient(135deg,#bd9334,#9a7422);
  border:none; border-radius:3px;
  color:#fff; font-family:inherit;
  text-transform:uppercase; letter-spacing:2.5px;
  font-size:clamp(0.78rem,2vw,0.88rem);
  cursor:pointer;
  transition:transform .35s, box-shadow .35s, letter-spacing .35s;
  box-shadow:0 6px 20px rgba(0,0,0,0.5);
}
.portal-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(201,146,42,0.38);
  letter-spacing:3.5px;
}
.portal-btn:active { transform:translateY(0); }

/* ─── MAIN CARD ─── */
#ui {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

.card {
  width:min(680px,92vw);
  background:var(--card-bg);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  border-radius:8px;
  padding:clamp(36px,6vw,64px) clamp(22px,5vw,54px);
  text-align:center;
  position:relative;
  pointer-events:auto;
  transform-style:preserve-3d;
  perspective:1000px;
  opacity:0;
  transform:scale(0.88) translateY(32px);
  transition:opacity 3s cubic-bezier(0.16,1,0.3,1), transform 3s cubic-bezier(0.16,1,0.3,1);
  box-shadow:
    0 50px 120px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 30px rgba(201,146,42,0.04);
}
.card.reveal { opacity:1; transform:scale(1) translateY(0); }

/* card border & corners */
.card-border { position:absolute; inset:0; border:1px solid rgba(201,146,42,0.2); border-radius:8px; pointer-events:none; }
.corner {
  position:absolute; width:22px; height:22px;
  border:2px solid var(--gold); pointer-events:none;
}
.tl{top:12px;left:12px;border-right:none;border-bottom:none;}
.tr{top:12px;right:12px;border-left:none;border-bottom:none;}
.bl{bottom:12px;left:12px;border-right:none;border-top:none;}
.br{bottom:12px;right:12px;border-left:none;border-top:none;}

/* hijri date */
.hijri {
  font-size:clamp(0.7rem,2vw,0.85rem);
  letter-spacing:4px; text-transform:uppercase;
  color:var(--text-muted); margin-bottom:22px;
  opacity:0; transform:translateY(-10px);
  transition:opacity 2s ease 1.2s, transform 2s ease 1.2s;
}
.card.reveal .hijri { opacity:.75; transform:translateY(0); }

/* main title */
.title {
  font-size:clamp(1.9rem,6vw,3.6rem);
  font-weight:700; letter-spacing:2px;
  display:flex; flex-direction:column; align-items:center;
  line-height:1.25; margin-bottom:14px;
  gap:2px;
}
.title-line {
  display:flex; flex-wrap:wrap; justify-content:center;
}
.char {
  display:inline-block;
  opacity:0; transform:translateY(28px) scale(0.88); filter:blur(6px);
  transition:all 1.1s cubic-bezier(0.16,1,0.3,1);
  background:linear-gradient(160deg,#fff 25%,var(--gold-light) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* underline divider */
.divider {
  width:160px; height:10px; margin:0 auto 22px; position:relative;
}
.divider-line {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:0; height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  box-shadow:0 0 8px var(--gold);
  transition:width 2.5s cubic-bezier(0.25,1,0.5,1) 1.8s;
}
.card.reveal .divider-line { width:100%; }

/* greeting */
.greeting {
  font-family:'Amiri', serif;
  font-size:clamp(1.1rem,3.5vw,1.6rem);
  color:var(--text-bright); font-weight:400;
  letter-spacing:2px; margin-bottom:14px; min-height:32px;
  opacity:0; transform:translateY(14px);
  transition:opacity 2s ease 1s, transform 2s ease 1s;
}
.card.reveal .greeting { opacity:1; transform:translateY(0); }

/* subtitle */
.subtitle {
  font-family:'Amiri', serif;
  font-size:clamp(0.88rem,2.8vw,1.08rem);
  color:#c9d8e8; line-height:1.85;
  letter-spacing:.8px; font-weight:400;
  max-width:480px; margin:0 auto 36px;
  opacity:0; transform:translateY(18px);
  transition:opacity 2.2s ease 2.2s, transform 2.2s ease 2.2s;
}
.card.reveal .subtitle { opacity:.9; transform:translateY(0); }

/* blast button */
.blast-btn {
  background:transparent;
  border:1px solid rgba(201,146,42,0.4);
  padding:clamp(12px,2.5vw,16px) clamp(28px,5vw,46px);
  border-radius:28px; color:#fff;
  font-family:inherit; font-size:clamp(0.78rem,2vw,0.9rem);
  letter-spacing:3.5px; text-transform:uppercase;
  cursor:pointer; position:relative;
  transition:border-color .45s, background .45s, box-shadow .45s, letter-spacing .45s;
  opacity:0; transform:translateY(22px);
  transition:opacity 2s ease 2.8s, transform 2s ease 2.8s, border-color .4s, background .4s, box-shadow .4s, letter-spacing .4s;
}
.card.reveal .blast-btn { opacity:1; transform:translateY(0); }
.blast-btn:hover {
  border-color:var(--gold-light);
  background:rgba(201,146,42,0.09);
  box-shadow:inset 0 0 18px rgba(201,146,42,0.18), 0 12px 32px rgba(0,0,0,0.5);
  letter-spacing:5px;
}
.blast-btn:active { transform:scale(0.97); }

/* ─── AUDIO HUD ─── */
#audio-hud {
  position:fixed;
  bottom:clamp(16px,4vw,36px);
  right:clamp(16px,4vw,36px);
  z-index:50;
  display:flex; align-items:center; gap:12px;
  pointer-events:auto;
  opacity:0; transition:opacity 2s ease 3.2s;
}
#audio-hud.vis { opacity:.65; }
#audio-hud:hover { opacity:1; }

.audio-label {
  font-size:clamp(0.62rem,1.8vw,0.72rem);
  letter-spacing:2px; text-transform:uppercase;
  color:var(--text-muted);
}
.audio-btn {
  width:42px; height:42px; border-radius:50%;
  background:rgba(4,11,22,0.65);
  border:1px solid rgba(255,255,255,0.12);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(6px);
  transition:border-color .3s, transform .3s;
}
.audio-btn:hover { border-color:var(--gold); transform:scale(1.08); }
.audio-btn svg { width:18px; height:18px; fill:#fff; transition:fill .3s; }
.audio-btn:hover svg { fill:var(--gold-light); }

/* ─── RESPONSIVE TWEAKS ─── */
@media(max-width:480px) {
  .title { font-size:clamp(1.6rem,8vw,2.2rem); }
  .portal-icon { width:44px; height:44px; }
}
@media(hover:none) {
  .blast-btn:hover { letter-spacing:3.5px; border-color:rgba(201,146,42,0.4); background:transparent; box-shadow:none; }
}
</style>
</head>
<body>

<canvas id="vfx"></canvas>
<div class="ambient"></div>

<!-- ═══ PORTAL ═══ -->
<div id="portal">
  <div class="portal-box">
    <svg class="portal-icon" viewBox="0 0 100 100">
      <!-- 8-pointed star (Rub el Hizb) -->
      <polygon points="50,5 61,39 95,50 61,61 50,95 39,61 5,50 39,39" fill="currentColor"/>
      <circle cx="50" cy="50" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    </svg>
    <h2 class="portal-title">Вуруд ба Таҷрибаи Рӯҳонӣ</h2>
    <input id="nameInput" class="portal-input" type="text"
      placeholder="Номи худро ворид кунед..." maxlength="25" autocomplete="off">
    <button id="enterBtn" class="portal-btn">Оғоз сӯи Нур ✦</button>
  </div>
</div>

<!-- ═══ MAIN UI ═══ -->
<div id="ui">
  <main class="card" id="card">
    <div class="card-border"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="hijri">10 Зулҳиҷҷа 1447 Ҳ.</div>

    <h1 class="title" id="titleEl"></h1>

    <div class="divider"><div class="divider-line"></div></div>

    <p class="greeting" id="greeting"></p>

    <p class="subtitle">
      Бигзор ин иди муқаддас ба хонадони шумо нур, баракат, сулҳу осоиштагӣ
      ва файзи илоҳӣ биёрад. Намозу қурбониҳои шумо мақбули даргоҳи Ҳақ гарданд.
    </p>

    <button class="blast-btn" id="blastBtn">Дуову Тӯҳфа ✦</button>
  </main>
</div>

<!-- ═══ AUDIO HUD ═══ -->
<div id="audio-hud">
  <span class="audio-label">Навои Илоҳӣ</span>
  <button class="audio-btn" id="audioBtn" aria-label="Toggle audio">
    <svg id="audioIcon" viewBox="0 0 24 24">
      <path id="iconPath" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
</div>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const S = {
  W: innerWidth, H: innerHeight,
  mx: innerWidth/2, my: innerHeight/2,
  tmx: innerWidth/2, tmy: innerHeight/2,
  gz: 0, gb: 0,               // gyro gamma/beta
  audioOn: false, audioReady: false,
  visitor: 'Меҳмони Муҳтарам',
  t0: null
};

/* ══════════════════════════════════════════════
   CANVAS SETUP
══════════════════════════════════════════════ */
const canvas = document.getElementById('vfx');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  S.W = innerWidth; S.H = innerHeight;
  canvas.width  = S.W * DPR;
  canvas.height = S.H * DPR;
  ctx.scale(DPR, DPR);
}
resize();
addEventListener('resize', resize);

addEventListener('mousemove', e => { S.tmx = e.clientX; S.tmy = e.clientY; });
addEventListener('touchmove', e => {
  S.tmx = e.touches[0].clientX;
  S.tmy = e.touches[0].clientY;
}, { passive: true });
addEventListener('deviceorientation', e => {
  S.gz = Math.max(-30, Math.min(30, e.gamma||0)) / 30;
  S.gb = Math.max(-30, Math.min(30, e.beta||0))  / 30;
});

/* ══════════════════════════════════════════════
   STARS
══════════════════════════════════════════════ */
const STAR_COUNT = 200;
const stars = Array.from({length: STAR_COUNT}, () => ({
  nx: Math.random(), ny: Math.random() * 0.72,
  r:  Math.random() * 1.2 + 0.3,
  pl: Math.random() * 0.8 + 0.2,
  ph: Math.random() * Math.PI * 2,
  sp: 0.008 + Math.random() * 0.018
}));

function drawStars(cx, cy, zoom) {
  for (const s of stars) {
    s.ph += s.sp;
    const a = 0.3 + (Math.sin(s.ph) + 1) * 0.33;
    let px = s.nx * S.W + cx * s.pl;
    let py = s.ny * S.H + cy * s.pl;
    px = (px - S.W/2) * zoom + S.W/2;
    py = (py - S.H/2) * zoom + S.H/2;
    if (px < 0) px += S.W;
    if (px > S.W) px -= S.W;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath();
    ctx.arc(px, py, s.r * zoom, 0, Math.PI*2);
    ctx.fill();
  }
}

/* ══════════════════════════════════════════════
   SHOOTING STAR
══════════════════════════════════════════════ */
const meteor = {
  active: false, x:0, y:0, vx:0, vy:0, len:0, alpha:0,
  schedule() {
    setTimeout(() => this.fire(), 6000 + Math.random()*12000);
  },
  fire() {
    this.x = Math.random() * S.W * 0.55;
    this.y = Math.random() * S.H * 0.25;
    const angle = Math.PI/6 + Math.random()*(Math.PI/10);
    const spd   = 12 + Math.random()*10;
    this.vx = Math.cos(angle)*spd; this.vy = Math.sin(angle)*spd;
    this.len = 60 + Math.random()*80; this.alpha = 1; this.active = true;
  },
  draw() {
    if (!this.active) return;
    this.x += this.vx; this.y += this.vy; this.alpha -= 0.016;
    if (this.alpha <= 0 || this.x > S.W || this.y > S.H) {
      this.active = false; this.schedule(); return;
    }
    const g = ctx.createLinearGradient(this.x, this.y,
      this.x-this.vx*3, this.y-this.vy*3);
    g.addColorStop(0,   `rgba(255,253,220,${this.alpha})`);
    g.addColorStop(0.25,`rgba(241,196,15,${this.alpha*.55})`);
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.save();
    ctx.strokeStyle = g; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - this.vx/this.vx*this.len*Math.cos(Math.atan2(this.vy,this.vx)),
               this.y - this.vy/this.vy*this.len*Math.sin(Math.atan2(this.vy,this.vx)));
    // fixed: direct offset
    ctx.lineTo(this.x - Math.cos(Math.atan2(this.vy,this.vx))*this.len,
               this.y - Math.sin(Math.atan2(this.vy,this.vx))*this.len);
    ctx.stroke();
    ctx.restore();
  }
};
meteor.schedule();

/* ══════════════════════════════════════════════
   MOON + SKY
══════════════════════════════════════════════ */
function drawSky(cx, cy, zoom) {
  const { W, H } = S;
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#02050c'); g.addColorStop(0.38,'#051026');
  g.addColorStop(0.72,'#0b1d3a'); g.addColorStop(1,'#020612');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Moon
  const mx = W*0.5 + cx*0.3;
  const my = H*0.24 + cy*0.25;
  const mr = Math.min(W,H)*0.07 * zoom;

  // glow
  const mg = ctx.createRadialGradient(mx,my,mr*.8,mx,my,mr*4);
  mg.addColorStop(0,'rgba(255,252,235,0.22)');
  mg.addColorStop(0.2,'rgba(241,196,15,0.07)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,mr*4,0,Math.PI*2); ctx.fill();

  // moon body
  ctx.save();
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#fefefa'; ctx.fillRect(mx-mr,my-mr,mr*2,mr*2);
  // craters
  ctx.fillStyle='rgba(215,208,185,0.38)';
  ctx.beginPath(); ctx.arc(mx-mr*.3,my+mr*.18,mr*.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx+mr*.38,my-mr*.12,mr*.17,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx+mr*.05,my+mr*.42,mr*.26,0,Math.PI*2); ctx.fill();
  // limb shadow
  const ls = ctx.createRadialGradient(mx-mr*.18,my-mr*.18,mr*.65,mx,my,mr);
  ls.addColorStop(0,'rgba(0,0,0,0)'); ls.addColorStop(1,'rgba(2,12,28,0.3)');
  ctx.fillStyle=ls; ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Islamic crescent overlay (decorative, NOT cutting the moon)
  ctx.save();
  ctx.fillStyle='rgba(201,146,42,0.12)';
  ctx.shadowColor='rgba(201,146,42,0.3)'; ctx.shadowBlur=12;
  // small star near moon
  drawSmallStar(ctx, mx+mr*1.28, my-mr*0.7, mr*0.13);
  ctx.restore();
}

function drawSmallStar(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle='rgba(241,196,15,0.85)';
  ctx.shadowColor='rgba(241,196,15,0.7)'; ctx.shadowBlur=8;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(-Math.PI/2)+(i*4*Math.PI/5);
    const b=a+2*Math.PI/5;
    if(i===0){ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a));}
    else{ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}
    ctx.lineTo(x+r*.42*Math.cos(b),y+r*.42*Math.sin(b));
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ══════════════════════════════════════════════
   MOSQUE SILHOUETTE (fixed path)
══════════════════════════════════════════════ */
function drawMosque(cx, cy, zoom) {
  const { W, H } = S;
  const horizon = H;
  ctx.save();
  ctx.translate(W/2 + cx*0.35, horizon);

  ctx.fillStyle='#040c1c';
  ctx.beginPath();

  // Ground
  ctx.moveTo(-W*0.6, 0);

  // Left wall
  ctx.lineTo(-W*0.38, -H*0.07);
  // Left minaret
  ctx.lineTo(-W*0.28, -H*0.07);
  ctx.lineTo(-W*0.28, -H*0.42);
  ctx.lineTo(-W*0.285, -H*0.42);
  ctx.lineTo(-W*0.273, -H*0.50); // spire tip
  ctx.lineTo(-W*0.262, -H*0.42);
  ctx.lineTo(-W*0.268, -H*0.42);
  ctx.lineTo(-W*0.268, -H*0.07);

  // Left arch dome
  ctx.lineTo(-W*0.175, -H*0.07);
  ctx.quadraticCurveTo(-W*0.135, -H*0.21, -W*0.095, -H*0.07);

  // Left inner wall
  ctx.lineTo(-W*0.085, -H*0.11);
  ctx.quadraticCurveTo(-W*0.075, -H*0.15, -W*0.065, -H*0.155);
  ctx.lineTo(-W*0.065, -H*0.165);

  // MAIN DOME - fixed using bezier curve
  ctx.bezierCurveTo(-W*0.062, -H*0.38, -W*0.028, -H*0.43, 0, -H*0.47);
  ctx.bezierCurveTo(W*0.028, -H*0.43, W*0.062, -H*0.38, W*0.065, -H*0.165);

  ctx.lineTo(W*0.065, -H*0.155);
  ctx.quadraticCurveTo(W*0.075, -H*0.15, W*0.085, -H*0.11);
  ctx.lineTo(W*0.095, -H*0.07);
  ctx.quadraticCurveTo(W*0.135, -H*0.21, W*0.175, -H*0.07);

  // Right minaret
  ctx.lineTo(W*0.268, -H*0.07);
  ctx.lineTo(W*0.268, -H*0.42);
  ctx.lineTo(W*0.262, -H*0.42);
  ctx.lineTo(W*0.273, -H*0.50);
  ctx.lineTo(W*0.285, -H*0.42);
  ctx.lineTo(W*0.28, -H*0.42);
  ctx.lineTo(W*0.28, -H*0.07);

  // Right wall
  ctx.lineTo(W*0.38, -H*0.07);
  ctx.lineTo(W*0.6, 0);
  ctx.closePath();
  ctx.fill();

  // Window glow
  const flash = 0.82 + Math.sin(performance.now()*0.0028)*0.18;
  ctx.shadowColor='rgba(243,156,18,.7)'; ctx.shadowBlur=14;
  ctx.fillStyle=`rgba(243,156,18,${0.38*flash})`;
  [-W*.04,-W*.02,0,W*.02,W*.04].forEach(wx => {
    ctx.beginPath();
    ctx.arc(wx, -H*.14, W*.004, Math.PI, 0, false);
    ctx.rect(wx-W*.004, -H*.14, W*.008, H*.013);
    ctx.fill();
  });

  ctx.restore();
}

/* ══════════════════════════════════════════════
   PARTICLES (petals + gold dust)
══════════════════════════════════════════════ */
const petals = Array.from({length:28}, () => ({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight - innerHeight,
  w: 5+Math.random()*6, h: 3+Math.random()*4,
  sy: .4+Math.random()*.7, sx: Math.random()*.4-.2,
  op: Math.random()*.3+.2, oa: Math.random()*Math.PI,
  os: .01+Math.random()*.02, rot:Math.random()*Math.PI,
  rs: Math.random()*.02-.01,
  r: 170+Math.random()*60|0, g: 30+Math.random()*25|0, b: 55+Math.random()*25|0
}));

const dust = Array.from({length:55}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: .5+Math.random()*2,
  sy: -(.1+Math.random()*.2), sx: Math.random()*.3-.15,
  oa: Math.random()*Math.PI, os: .02+Math.random()*.04,
  a: .15+Math.random()*.45
}));

function drawParticles(cx, cy, now) {
  // petals
  for(const p of petals) {
    p.y += p.sy; p.x += p.sx + Math.sin(p.oa)*.25;
    p.oa += p.os; p.rot += p.rs;
    if(p.y > S.H) { p.y=-15; p.x=Math.random()*S.W; }
    ctx.save();
    ctx.translate(p.x+cx*.9, p.y+cy*.9);
    ctx.rotate(p.rot);
    ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.op})`;
    ctx.beginPath(); ctx.ellipse(0,0,p.w,p.h,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // gold dust with mouse repel
  for(const d of dust) {
    d.y += d.sy; d.x += d.sx+Math.sin(d.oa)*.08; d.oa += d.os;
    if(d.y<0){d.y=S.H+5; d.x=Math.random()*S.W;}
    let rx=d.x, ry=d.y;
    const dx=S.mx-d.x, dy=S.my-d.y, dist=Math.hypot(dx,dy);
    if(dist<140){ const f=(140-dist)/140; rx-=dx/dist*f*12; ry-=dy/dist*f*12; }
    ctx.fillStyle=`rgba(243,156,18,${d.a*(0.45+Math.sin(now*.002+d.x)*.55)})`;
    ctx.shadowColor='rgba(241,196,15,.5)'; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(rx+cx*.65,ry+cy*.65,d.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

/* ══════════════════════════════════════════════
   LANTERNS (fixed resetTransform bug)
══════════════════════════════════════════════ */
function drawLantern(x0, y0, ropeLen, angle, blur) {
  ctx.save();
  if(blur>0) ctx.filter=`blur(${blur}px)`;
  ctx.translate(x0, y0);
  ctx.rotate(angle);

  // rope
  ctx.strokeStyle='#1a1105'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,ropeLen); ctx.stroke();

  ctx.translate(0, ropeLen);

  // top cap
  ctx.fillStyle='#2c1e0a'; ctx.strokeStyle='#bd9334'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(-14,0); ctx.lineTo(14,0);
  ctx.lineTo(10,-11); ctx.lineTo(-10,-11); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // body glow
  const gg = ctx.createRadialGradient(0,17,2,0,17,24);
  gg.addColorStop(0,'#fff6e0'); gg.addColorStop(.3,'#f1c40f');
  gg.addColorStop(.7,'rgba(230,126,34,.35)'); gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;
  ctx.beginPath();
  ctx.moveTo(-14,0); ctx.lineTo(14,0);
  ctx.lineTo(20,34); ctx.lineTo(-20,34); ctx.closePath();
  ctx.fill();

  // ribs
  ctx.strokeStyle='#3d2b10';
  ctx.beginPath();
  ctx.moveTo(-14,0); ctx.lineTo(-20,34);
  ctx.moveTo(14,0);  ctx.lineTo(20,34);
  ctx.moveTo(-4,0);  ctx.lineTo(-6,34);
  ctx.moveTo(4,0);   ctx.lineTo(6,34);
  ctx.stroke();

  // bottom cap
  ctx.fillStyle='#2c1e0a';
  ctx.strokeStyle='#422f12';
  ctx.fillRect(-20,34,40,7);
  ctx.strokeRect(-20,34,40,7);

  ctx.restore(); // restores full transform safely
}

function drawLanterns(cx) {
  const now = performance.now();
  drawLantern(S.W*.1+cx*1.6,  -22, 105, Math.sin(now*.001)*.04,   10);
  drawLantern(S.W*.9+cx*1.6,  -15, 155, Math.cos(now*.0013)*.05,  0);
}

/* ══════════════════════════════════════════════
   CALLIGRAPHY BLAST
══════════════════════════════════════════════ */
const glyphs=['ب','م','ع','ر','ح','ن','ص'];
const blastParticles=[];

function spawnBlast(x,y){
  for(let i=0;i<38;i++){
    const a=Math.random()*Math.PI*2, spd=3+Math.random()*6;
    blastParticles.push({
      x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.5,
      g:glyphs[Math.random()*glyphs.length|0],
      a:1,sz:12+Math.random()*13,
      rot:Math.random()*Math.PI*2,rs:Math.random()*.12-.06
    });
  }
}

function drawBlast(){
  ctx.save();
  for(let i=blastParticles.length-1;i>=0;i--){
    const p=blastParticles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.09;
    p.rot+=p.rs; p.a-=.016;
    if(p.a<=0){blastParticles.splice(i,1);continue;}
    ctx.save();
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=`rgba(241,196,15,${p.a})`;
    ctx.shadowColor='#f39c12'; ctx.shadowBlur=9;
    ctx.font=`${p.sz}px 'Amiri','Georgia',serif`;
    ctx.fillText(p.g,0,0);
    ctx.restore();
  }
  ctx.restore();
}

/* ══════════════════════════════════════════════
   PARALLAX
══════════════════════════════════════════════ */
const card=document.getElementById('card');
function applyParallax(){
  S.mx += (S.tmx-S.mx)*.04;
  S.my += (S.tmy-S.my)*.04;
  const isMobile = S.H > S.W;
  const ox = isMobile ? S.gz : (S.mx-S.W/2)/(S.W/2);
  const oy = isMobile ? S.gb : (S.my-S.H/2)/(S.H/2);
  card.style.transform=`rotateX(${-oy*10}deg) rotateY(${ox*10}deg) translate(${ox*8}px,${oy*8}px)`;
  return {x: ox*-38, y: oy*-18};
}

/* ══════════════════════════════════════════════════════════════
   ULTRA-CINEMATIC ISLAMIC AMBIENT ENGINE
   ── Maqam Hijaz on D (D Eb F# G A Bb C D) ──
   The most emotionally evocative maqam in Islamic music tradition.
   Layers (mixed in signal chain order):
     1. Desert wind   — filtered white noise, slow sweeping gusts
     2. Tandoor drone — sub-bass open fifth D1+A1, ultra-slow vibrato
     3. Cinematic pads — 5-voice Hijaz chord cluster with slow swells
     4. Tremolo strings — bowed string shimmer, slow bow strokes
     5. Ney flute — 3-oscillator blend (triangle+sine+slight breath)
                    with expressive vibrato + filter tracking
     6. Oud plucks — karsilama-style sparse plucked responses
     7. Qanun shimmer — high bell-like harmonics on phrase peaks
     8. Subtle frame drum — ghost note pulse at 60 BPM, very low
   All routed through:
     → Pre-gain per layer → master bus → 6s cathedral reverb convolver
     → Wet 70% / Dry 30% for maximum divine space
══════════════════════════════════════════════════════════════ */
let AC=null, master=null, audioInited=false;

// Maqam Hijaz on D — the 'desert longing' maqam
// D  Eb  F#  G  A  Bb  C  D (octave)
const HIJAZ = {
  // Frequencies across two octaves for full melodic range
  low:  [146.83, 155.56, 185.00, 196.00, 220.00, 233.08, 261.63, 293.66],
  mid:  [293.66, 311.13, 370.00, 392.00, 440.00, 466.16, 523.25, 587.33],
  high: [587.33, 622.25, 740.00, 783.99, 880.00, 932.33, 1046.50, 1174.66]
};

function initAudio(){
  if(audioInited) return;
  audioInited=true;
  AC = new (window.AudioContext||window.webkitAudioContext)();

  // ── Master bus ──
  master = AC.createGain();
  master.gain.value = 0.001;

  // ── Compressor for cinematic glue ──
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18;
  comp.knee.value = 12;
  comp.ratio.value = 4;
  comp.attack.value = 0.15;
  comp.release.value = 0.6;

  // ── Cathedral reverb (6 seconds, mosque hall simulation) ──
  const revSec = 6.0;
  const revLen = AC.sampleRate * revSec;
  const revBuf = AC.createBuffer(2, revLen, AC.sampleRate);
  for(let c=0;c<2;c++){
    const d = revBuf.getChannelData(c);
    for(let i=0;i<revLen;i++){
      // Exponential decay with early reflections bump at ~80ms
      const earlyBoost = i < AC.sampleRate*0.08 ? 1.4 : 1.0;
      d[i] = (Math.random()*2-1) * earlyBoost * Math.pow(1 - i/revLen, 1.6);
    }
  }
  const rev = AC.createConvolver(); rev.buffer = revBuf;

  // ── Routing: master → compressor → dry+wet ──
  const wet = AC.createGain(); wet.gain.value = 0.72;
  const dry = AC.createGain(); dry.gain.value = 0.28;
  master.connect(comp);
  comp.connect(dry);   dry.connect(AC.destination);
  comp.connect(rev);   rev.connect(wet); wet.connect(AC.destination);

  // ── Build all layers ──
  buildDesertWind();
  buildTandoorDrone();
  buildCinematicPads();
  buildTremoloStrings();
  buildNeyFlute();
  buildOudPlucks();
  buildQanunShimmer();
  buildFrameDrum();
}

/* ════════════════════════════════════
   LAYER 1 — Desert Wind
   Stereo pink-ish noise through slow sweeping bandpass.
   Two channels panned L/R for width.
════════════════════════════════════ */
function buildDesertWind(){
  const SR = AC.sampleRate;
  for(let ch=0; ch<2; ch++){
    const bufLen = SR * 4;
    const nb = AC.createBuffer(1, bufLen, SR);
    const nd = nb.getChannelData(0);
    // Pink-ish noise: accumulate for low-frequency richness
    let b0=0,b1=0,b2=0;
    for(let i=0;i<bufLen;i++){
      const w = Math.random()*2-1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      nd[i] = (b0+b1+b2+w*0.5362)*0.11;
    }
    const src = AC.createBufferSource(); src.buffer=nb; src.loop=true;

    const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=2.2;
    const pan = AC.createStereoPanner ? AC.createStereoPanner() : null;
    const wg = AC.createGain(); wg.gain.value = 0.038;

    src.connect(bp);
    if(pan){ pan.pan.value = ch===0?-0.6:0.6; bp.connect(pan); pan.connect(wg); }
    else bp.connect(wg);
    wg.connect(master);
    src.start(0);

    // Sweep filter frequency slowly — gusts of desert wind
    const sweep = ()=>{
      if(!S.audioOn) return;
      const f = 120 + Math.random()*280;
      const t = 5 + Math.random()*8;
      bp.frequency.linearRampToValueAtTime(f, AC.currentTime+t);
      // Volume gust
      const gv = 0.018 + Math.random()*0.038;
      wg.gain.linearRampToValueAtTime(gv, AC.currentTime+t*0.5);
      wg.gain.linearRampToValueAtTime(0.018, AC.currentTime+t);
      setTimeout(sweep, t*1000);
    };
    setTimeout(sweep, ch*2500 + 500);
  }
}

/* ════════════════════════════════════
   LAYER 2 — Tandoor Bass Drone
   D1 + A1 open fifth, sine waves, ultra-slow breath vibrato.
   Creates the physical floor of the soundscape.
════════════════════════════════════ */
function buildTandoorDrone(){
  // D1=36.71 Hz,  A1=55.00 Hz
  [[36.71, 0.040], [55.00, 0.026], [73.42, 0.015]].forEach(([f, vol], i)=>{
    const o = AC.createOscillator(); o.type='sine'; o.frequency.value=f;
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=200;
    const g = AC.createGain(); g.gain.value=vol;

    // Extremely slow vibrato (breathing feel, not pitch wobble)
    const vib = AC.createOscillator(); const vg = AC.createGain();
    vib.frequency.value = 0.08 + i*0.04; vg.gain.value = f*0.003;
    vib.connect(vg); vg.connect(o.frequency);

    o.connect(lp); lp.connect(g); g.connect(master);
    o.start(); vib.start();

    // Slow swell every 12–20 s
    const swell=()=>{
      if(!S.audioOn) return;
      const tv = vol*(0.6+Math.random()*0.8);
      const td = 10+Math.random()*10;
      g.gain.linearRampToValueAtTime(tv, AC.currentTime+td);
      setTimeout(swell, td*1000);
    };
    setTimeout(swell, i*4000+2000);
  });
}

/* ════════════════════════════════════
   LAYER 3 — Cinematic Pads
   5-voice Hijaz chord: D2 Eb2 F#2 A2 C3
   Each voice is triangle+sine, soft low-pass, slow independent swell.
   Creates the warm harmonic bed.
════════════════════════════════════ */
function buildCinematicPads(){
  // D2  Eb2   F#2    A2     C3
  const chord=[73.42, 77.78, 92.50, 110.00, 130.81];
  chord.forEach((f,i)=>{
    const o1 = AC.createOscillator(); o1.type='triangle'; o1.frequency.value=f;
    const o2 = AC.createOscillator(); o2.type='sine';     o2.frequency.value=f*2.002;
    const o3 = AC.createOscillator(); o3.type='sine';     o3.frequency.value=f*3.005;

    // Detune slightly for lush chorus effect
    o1.detune.value = (i%2===0)?+3:-3;
    o2.detune.value = -5;

    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=440;
    lp.Q.value=0.5;

    const g1=AC.createGain(); g1.gain.value=0.038;
    const g2=AC.createGain(); g2.gain.value=0.014;
    const g3=AC.createGain(); g3.gain.value=0.007;

    o1.connect(g1); g1.connect(lp);
    o2.connect(g2); g2.connect(lp);
    o3.connect(g3); g3.connect(lp);
    lp.connect(master);
    [o1,o2,o3].forEach(o=>o.start());

    // Independent breathing: each voice swells out of phase
    const breathe=()=>{
      if(!S.audioOn) return;
      const peak = 0.022+Math.random()*0.032;
      const dur  = 7+Math.random()*8;
      g1.gain.linearRampToValueAtTime(peak,        AC.currentTime+dur);
      g1.gain.linearRampToValueAtTime(peak*0.55,   AC.currentTime+dur*2);
      setTimeout(breathe, dur*2000);
    };
    setTimeout(breathe, i*1800+1000);
  });
}

/* ════════════════════════════════════
   LAYER 4 — Tremolo Strings
   Mid-register bowed string shimmer.
   Slow tremolo LFO on gain simulates a bow stroke.
════════════════════════════════════ */
function buildTremoloStrings(){
  // Hijaz mid: D3 F#3 A3 Bb3
  [[146.83,0.022],[185.00,0.018],[220.00,0.015],[233.08,0.012]].forEach(([f,vol],i)=>{
    const o = AC.createOscillator(); o.type='triangle'; o.frequency.value=f;
    o.detune.value = i%2===0 ? +5 : -5; // slight chorus spread

    // Bow pressure filter
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
    const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=80;

    // Tremolo: slow LFO on gain
    const tremoloLFO = AC.createOscillator(); tremoloLFO.type='sine';
    tremoloLFO.frequency.value = 0.6+i*0.08; // slightly different per voice
    const tremoloGain = AC.createGain(); tremoloGain.gain.value = vol*0.35;
    const baseGain = AC.createGain(); baseGain.gain.value = vol*0.65;
    const outGain  = AC.createGain(); outGain.gain.value  = 1.0;

    tremoloLFO.connect(tremoloGain);
    tremoloGain.connect(outGain.gain); // modulate the output gain

    o.connect(hp); hp.connect(lp); lp.connect(baseGain);
    baseGain.connect(outGain); outGain.connect(master);
    o.start(); tremoloLFO.start();

    // Slow swell of the whole string layer
    const swell=()=>{
      if(!S.audioOn) return;
      const tv = vol*(0.5+Math.random()*1.1);
      const td = 9+Math.random()*11;
      baseGain.gain.linearRampToValueAtTime(tv*0.65, AC.currentTime+td);
      setTimeout(swell, td*1000);
    };
    setTimeout(swell, i*2200+3000);
  });
}

/* ════════════════════════════════════
   LAYER 5 — Ney Flute (main melody)
   Most expressive layer. Uses:
    • Triangle oscillator — ney body tone
    • Sine sub-oscillator — breath warmth
    • Very subtle band-limited noise — air rush
    • Natural vibrato LFO (4.8Hz)
    • Expressive resonant bandpass filter sweep
    • Human-feel envelope: slow 600ms attack, tapered release
   Plays structured melodic phrases in Maqam Hijaz.
════════════════════════════════════ */
function buildNeyFlute(){
  function neyNote(freq, t, dur, intensity=1.0){
    const SR = AC.sampleRate;

    // ── Body tone (triangle — closest to ney timbre) ──
    const body = AC.createOscillator(); body.type='triangle';
    body.frequency.setValueAtTime(freq, t);

    // ── Octave shimmer (sine, very soft) ──
    const shimmer = AC.createOscillator(); shimmer.type='sine';
    shimmer.frequency.setValueAtTime(freq*2.003, t);

    // ── Breath noise (bandpass-filtered pink noise) ──
    const noiseLen = Math.ceil(dur * SR);
    const nb = AC.createBuffer(1, noiseLen, SR);
    const nd = nb.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for(let i=0;i<noiseLen;i++){
      const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
      nd[i]=(b0+b1+b2+w*0.5362)*0.13;
    }
    const ns = AC.createBufferSource(); ns.buffer=nb;
    const nbp = AC.createBiquadFilter(); nbp.type='bandpass';
    nbp.frequency.setValueAtTime(freq*1.1, t);
    nbp.Q.value = 8.0;
    const nGain = AC.createGain(); nGain.gain.value = 0.018*intensity; // very subtle

    ns.connect(nbp); nbp.connect(nGain);

    // ── Vibrato LFO ──
    const vib  = AC.createOscillator(); vib.type='sine';
    vib.frequency.setValueAtTime(4.8, t);
    const vibG = AC.createGain();
    // Vibrato ramps in slowly (not immediate — more human)
    vibG.gain.setValueAtTime(0, t);
    vibG.gain.linearRampToValueAtTime(freq*0.005, t+0.8);
    vibG.gain.linearRampToValueAtTime(freq*0.007, t+dur*0.5);
    vib.connect(vibG);
    vibG.connect(body.frequency);
    vibG.connect(shimmer.frequency);

    // ── Resonant tone-tracking filter ──
    const tone = AC.createBiquadFilter(); tone.type='lowpass';
    tone.Q.value = 1.8;
    tone.frequency.setValueAtTime(freq*1.8, t);
    tone.frequency.linearRampToValueAtTime(freq*2.4, t+0.15); // open up on attack
    tone.frequency.linearRampToValueAtTime(freq*1.5, t+dur*0.6); // close into sustain
    tone.frequency.linearRampToValueAtTime(freq*1.0, t+dur);  // close on release

    // ── Body gain ──
    const bG = AC.createGain(); bG.gain.value = 0.09*intensity;
    const sG = AC.createGain(); sG.gain.value = 0.022*intensity;

    body.connect(bG); bG.connect(tone);
    shimmer.connect(sG); sG.connect(tone);
    nGain.connect(tone);

    // ── Envelope: slow attack (human breath), long release ──
    const env = AC.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(0.001, t+0.02);        // slight pre-delay
    env.gain.linearRampToValueAtTime(intensity, t+0.6);      // slow emotional attack
    env.gain.setValueAtTime(intensity*0.88, t+dur-0.8);      // slight sustain dip
    env.gain.exponentialRampToValueAtTime(0.001, t+dur);     // fade to silence

    tone.connect(env); env.connect(master);

    [vib, body, shimmer].forEach(o=>{ o.start(t); o.stop(t+dur+0.1); });
    ns.start(t); ns.stop(t+dur);
  }

  // ── Structured Hijaz phrases (5 melodic patterns, cycle through) ──
  // These match real Maqam Hijaz melodic movement: rise, peak, descend
  const PHRASES = [
    // Pattern 1: Opening call — low to high to rest
    [3,4,5,6,5,4,3,2],
    // Pattern 2: Longing ascent — stepwise up with characteristic aug2
    [2,3,5,5,6,5,3,2],
    // Pattern 3: Descent with ornamentation
    [6,5,4,3,2,3,2,1],
    // Pattern 4: Mid-range meditation
    [4,5,4,3,4,5,6,5],
    // Pattern 5: Resolution phrase — returns to tonic
    [5,6,7,6,5,4,3,2,1]
  ];
  const scale = HIJAZ.mid;
  let phraseIdx = 0;

  function phrase(){
    if(!S.audioOn) return;
    const pat = PHRASES[phraseIdx % PHRASES.length];
    phraseIdx++;

    let t = AC.currentTime + 0.5;
    const beatDur = 2.2 + Math.random()*1.0; // 2.2–3.2s per note = very slow tempo

    pat.forEach((idx, i)=>{
      const f = scale[Math.min(idx, scale.length-1)];
      // Vary duration: held notes on scale degrees 1,5 (emotional peaks)
      const isEmphasis = idx===1||idx===5;
      const dur = isEmphasis
        ? beatDur * (1.6 + Math.random()*0.4)  // longer hold on peak notes
        : beatDur * (0.85 + Math.random()*0.3); // regular duration
      // Vary intensity: phrases swell toward middle, relax at end
      const peakNorm = Math.sin((i/pat.length)*Math.PI);
      const intensity = 0.55 + peakNorm*0.45;

      neyNote(f, t, dur, intensity);
      t += dur * 0.82; // slight overlap (legato)
    });

    // Wait for phrase to finish + silence gap (sacred pause between phrases)
    const phraseDuration = pat.length * beatDur;
    const silenceGap = 4000 + Math.random()*8000; // 4–12 seconds silence
    setTimeout(phrase, phraseDuration*1000 + silenceGap);
  }

  phrase(); // start immediately
}

/* ════════════════════════════════════
   LAYER 6 — Oud Plucks
   Sparse karsilama-style string responses.
   Triangle + harmonic series, fast attack, long natural decay.
   Answers the ney melody with single tones.
════════════════════════════════════ */
function buildOudPlucks(){
  function oudNote(freq, t, vol=1.0){
    // Oud timbre: rich harmonic content
    const harmonics = [1, 2, 3, 4, 5];
    const amps      = [0.050, 0.030, 0.016, 0.008, 0.004];

    harmonics.forEach((h,i)=>{
      const o = AC.createOscillator();
      o.type = i===0 ? 'triangle' : 'sine';
      o.frequency.value = freq * h;
      const g = AC.createGain();
      // Each harmonic decays at different rate (higher = faster decay)
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(amps[i]*vol, t+0.006);
      g.gain.exponentialRampToValueAtTime(0.001, t + 3.5/(h*0.6));
      const lp = AC.createBiquadFilter(); lp.type='lowpass';
      lp.frequency.value = 2800/(h*0.5+0.5);
      o.connect(lp); lp.connect(g); g.connect(master);
      o.start(t); o.stop(t+4);
    });
  }

  // Oud plays sparse accompaniment between ney phrases
  const OUD_SCALE = HIJAZ.low; // one octave lower than ney
  function oudPhrase(){
    if(!S.audioOn) return;
    const n = 2 + Math.floor(Math.random()*3); // 2–4 notes
    let t = AC.currentTime + 0.3;
    // Prefer stepwise motion, occasional leap
    let idx = 1 + Math.floor(Math.random()*5);
    for(let i=0;i<n;i++){
      const step = Math.floor(Math.random()*5)-2;
      idx = Math.max(0, Math.min(OUD_SCALE.length-1, idx+step));
      const dur = 2.0 + Math.random()*1.5;
      oudNote(OUD_SCALE[idx], t, 0.7+Math.random()*0.3);
      t += dur;
    }
    setTimeout(oudPhrase, (n*2200) + 9000 + Math.random()*8000);
  }
  setTimeout(oudPhrase, 5000); // enters after ney establishes itself
}

/* ════════════════════════════════════
   LAYER 7 — Qanun Shimmer
   High-register bell-like harmonic overtones.
   Sounds like struck strings or a qanun (zither).
   Only plays on phrase peaks for emotional punctuation.
════════════════════════════════════ */
function buildQanunShimmer(){
  function qanunNote(freq, t){
    // Two closely-detuned sines create natural beating (like a real string pair)
    [[0,0.028],[+8,0.018],[-5,0.014]].forEach(([det,vol])=>{
      const o = AC.createOscillator(); o.type='sine';
      o.frequency.value=freq; o.detune.value=det;
      const g = AC.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol, t+0.004); // instant pluck
      g.gain.exponentialRampToValueAtTime(0.001, t+4.5); // long shimmer decay
      const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=500;
      o.connect(hp); hp.connect(g); g.connect(master);
      o.start(t); o.stop(t+5);
    });
  }

  // High Hijaz: F#5 A5 D6
  const HIGH_TONES = [740.00, 880.00, 1174.66, 587.33, 622.25];
  function shimmerPhrase(){
    if(!S.audioOn) return;
    const t = AC.currentTime + 0.1;
    const n = 1 + Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){
      const f = HIGH_TONES[Math.floor(Math.random()*HIGH_TONES.length)];
      qanunNote(f, t + i*2.2);
    }
    setTimeout(shimmerPhrase, (n*2200) + 12000 + Math.random()*10000);
  }
  setTimeout(shimmerPhrase, 8000); // enters last, adds sparkle
}

/* ════════════════════════════════════
   LAYER 8 — Frame Drum (ghost pulse)
   Very subtle 60 BPM low-thud. More felt than heard.
   Uses filtered noise burst with fast attack, slow decay.
   Minimal — only every 4 beats to keep it spiritual, not rhythmic.
════════════════════════════════════ */
function buildFrameDrum(){
  const BPM = 58;
  const BEAT = 60/BPM; // ~1.035s per beat
  let tick = 0;

  function beat(){
    if(!S.audioOn){ setTimeout(beat, 800); return; }

    // Only hit on beat 1 of every 4-beat bar (downbeat only)
    if(tick % 4 === 0){
      const SR = AC.sampleRate;
      const dur = 0.22;
      const nb = AC.createBuffer(1, Math.ceil(SR*dur), SR);
      const nd = nb.getChannelData(0);
      for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nd.length,2.8);

      const src = AC.createBufferSource(); src.buffer=nb;

      // Tune the drum: bandpass around 65Hz (deep frame drum pitch)
      const bp1 = AC.createBiquadFilter(); bp1.type='bandpass';
      bp1.frequency.value=65; bp1.Q.value=1.2;
      const bp2 = AC.createBiquadFilter(); bp2.type='lowpass';
      bp2.frequency.value=180;

      // Pitch sweep (thwack feel)
      const pitchEnv = AC.createOscillator(); pitchEnv.type='sine';
      pitchEnv.frequency.value=65;
      const pG = AC.createGain(); pG.gain.value=0;
      pG.gain.setValueAtTime(30, AC.currentTime);
      pG.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.08);
      pitchEnv.connect(pG); pG.connect(bp1.frequency);

      const g = AC.createGain(); g.gain.value = 0.042; // very soft
      src.connect(bp1); bp1.connect(bp2); bp2.connect(g); g.connect(master);
      src.start(); pitchEnv.start(); pitchEnv.stop(AC.currentTime+0.1);
    }
    tick++;
    setTimeout(beat, BEAT*1000);
  }
  setTimeout(beat, 12000); // enters very late — subtle foundation
}

function setVol(v){
  if(!AC) return;
  master.gain.linearRampToValueAtTime(Math.max(0.001, v), AC.currentTime+3.0);
}

/* ══════════════════════════════════════════════
   PORTAL LOGIC
══════════════════════════════════════════════ */
const portal=document.getElementById('portal');
const enterBtn=document.getElementById('enterBtn');
const nameInput=document.getElementById('nameInput');
const greetingEl=document.getElementById('greeting');
const blastBtn=document.getElementById('blastBtn');
const audioHud=document.getElementById('audio-hud');
const audioBtn=document.getElementById('audioBtn');
const iconPath=document.getElementById('iconPath');

const ICON_ON ='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
const ICON_OFF='M4.19 4.19L3 5.38l4.44 4.44H3v4.38h4l5 5V14.81l4.73 4.73c-.56.38-1.17.69-1.83.89v2.03c1.21-.25 2.32-.8 3.28-1.55l2.43 2.43 1.19-1.19L4.19 4.19zM12 4L8.71 7.29 12 10.59V4z';

function enter(){
  const n=nameInput.value.trim();
  if(n) S.visitor=n;
  greetingEl.textContent=`Салом, ${S.visitor}`;

  initAudio();
  S.audioOn=true;
  setVol(0.72);

  iconPath.setAttribute('d',ICON_ON);
  audioHud.classList.add('vis');

  portal.classList.add('gone');
  setTimeout(()=>{
    card.classList.add('reveal');
    animTitle();
  },800);
}

enterBtn.addEventListener('click',enter);
nameInput.addEventListener('keydown',e=>{ if(e.key==='Enter') enter(); });

blastBtn.addEventListener('click',e=>{
  const r=blastBtn.getBoundingClientRect();
  spawnBlast(r.left+r.width/2, r.top+r.height/2);
});

audioBtn.addEventListener('click',()=>{
  if(S.audioOn){
    setVol(0.001); S.audioOn=false; iconPath.setAttribute('d',ICON_OFF);
  } else {
    initAudio(); S.audioOn=true; setVol(0.72); iconPath.setAttribute('d',ICON_ON);
  }
});

/* ══════════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════════ */
function loop(ts){
  if(!S.t0) S.t0=ts;
  const elapsed=ts-S.t0;
  ctx.clearRect(0,0,S.W,S.H);

  const zoom=1+Math.sin((elapsed%40000)/40000*Math.PI)*.06;
  const cam=applyParallax();

  drawSky(cam.x, cam.y, zoom);
  drawStars(cam.x, cam.y, zoom);
  meteor.draw();
  drawMosque(cam.x, cam.y, zoom);
  drawParticles(cam.x, cam.y, ts);
  drawLanterns(cam.x);
  drawBlast();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
